name: Enrich Skills Catalog

on:
  schedule:
    - cron: "0 4 * * 0" # Sunday 04:00 UTC
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of repos to enrich"
        default: "500"

permissions:
  contents: read

concurrency:
  group: enrich-catalog
  cancel-in-progress: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run enrichment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          ENRICH_BATCH_SIZE: ${{ inputs.batch_size || '500' }}
        run: pnpm --filter @skills-library/scripts enrich
